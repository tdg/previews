<body class="bg-gray-50 min-h-screen p-8">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, useReducer, useContext } = React;


    // Gall-Peters projection formulas
    // x = λ * cos(45°) = λ * 0.7071
    // y = sin(φ) / cos(45°) = sin(φ) * 1.4142

    const GP = {
      toX: (lon, width) => (lon + 180) / 360 * width,
      toY: (lat, height) => {
        const sinLat = Math.sin((lat * Math.PI) / 180);
        const y = sinLat * 1.4142;
        return height / 2 - (y / 2.8284) * height;
      },
    };

    // Simplified country outlines (key vertices only) as [lon, lat] pairs
    // These are rough but recognisable shapes for each target country
    const countries = [
      {
        id: "uk",

        year: "2029",

        system: "FPTP",
        seats: 650,

        opportunity: "Swap My Vote's home turf. The platform has operated across multiple UK general elections with a proven model. The fragmented five-to-six party landscape creates ideal conditions: voters trapped in safe seats for Party A can swap with voters in marginals who prefer Party A but face a different tactical imperative.",

        centroid: [-2, 54],
        labelOffset: [-40, -20],
        paths: [
          // Great Britain simplified

        ]
      },
      {
        id: "usa",
        name: "USA",
        year: "2026/28",
        tier: 1,
        system: "FPTP + Electoral College",
        seats: "435 House + 538 EC",
        problem: "House elections use FPTP in single-member districts. The presidential Electoral College's winner-take-all-by-state design means millions of votes in safe states are structurally irrelevant. Third-party or independent voters face intense spoiler pressure.",
        opportunity: "Vote swapping between safe and swing states for the presidential race. A voter in California who prefers a third party can swap with a swing-state voter who shares their strategic interest. US vote-swap sites have faced legal scrutiny but operated in 2000, 2016, and 2020. The 2028 presidential and 2026 midterms both present opportunities.",
        next: "Midterms Nov 2026 (House); Presidential Nov 2028.",
        centroid: [-98, 40],
        labelOffset: [0, -15],
        paths: [
          // Continental US simplified
          [[-124,48.5],[-123,46],[-124,43],[-120,39],[-117,33],[-114,32.5],[-111,31.5],[-108,31.8],[-104,29.5],[-97,26],[-94,29.5],[-90,29],[-89,30],[-85,30],[-82,25],[-80,25],[-80,31],[-75,35],[-73,40],[-70,41.5],[-67,45],[-67,47.5],[-82,42],[-84,46.5],[-88,48],[-90,48],[-95,49],[-105,49],[-120,49],[-124,48.5]]
        ]
      },
      {
        id: "india",
        name: "INDIA",
        year: "2029",
        tier: 1,
        system: "FPTP",
        seats: 543,
        problem: "The world's largest FPTP exercise. With dozens of parties competing across 543 constituencies, vote-splitting is endemic. Winning candidates routinely take seats with 30–35% of the vote. Coalition arithmetic at the national level is shaped by thousands of local tactical miscalculations.",
        opportunity: "Immense scale. India's multi-party, multi-regional landscape means vote swapping could operate at both national and state levels. The challenge is linguistic and technological diversity, but India's mobile-first digital infrastructure is strong. State assembly elections in 2026–28 could serve as testing grounds.",
        next: "Lok Sabha elections expected by April/May 2029.",
        centroid: [79, 22],
        labelOffset: [0, 0],
        paths: [
          [[68,23.5],[68.5,26],[70,28],[72,32],[74,34.5],[76,34.5],[78,35.5],[80,33],[82,28],[84,28.5],[87,28],[88,26.5],[89,26.2],[92,26],[97,28],[97,25],[93,20],[87,22],[82,16],[80,13],[77,8],[76,11],[74,12],[72,20],[68,23.5]]
        ]
      },
      {
        id: "canada",
        name: "CANADA",
        year: "≤2029",
        tier: 1,
        system: "FPTP",
        seats: 343,
        problem: "Three-to-four party system consistently distorted by FPTP. The Bloc Québécois wins dozens of seats on a regional vote share, while the NDP's nationally distributed support converts poorly. The Liberals won a majority government in 2025 on ~39% of the vote.",
        opportunity: "Strong digital infrastructure, highly engaged electorate, active electoral reform movement. Strategic voting sites already operate (e.g. VoteSmart, LeadNow). A swap platform could formalise what Canadian progressive voters already attempt informally. The Carney majority may delay the next election to 2029, but a minority parliament could trigger one earlier.",
        next: "Fixed date 15 Oct 2029; earlier election possible.",
        centroid: [-96, 60],
        labelOffset: [0, -10],
        paths: [
          // Canada simplified southern border + rough coastline
          [[-141,60],[-141,69],[-130,72],[-120,75],[-90,75],[-80,78],[-65,73],[-60,70],[-55,52],[-60,47],[-66,44],[-67,47.5],[-82,42],[-84,46.5],[-88,48],[-95,49],[-120,49],[-124,48.5],[-130,55],[-141,60]]
        ]
      },
      {
        id: "france",
        name: "FRANCE",
        year: "≤2029",
        tier: 2,
        system: "Two-round",
        seats: 577,
        problem: "Single-member constituencies with a two-round system. The first round is effectively a multi-party FPTP race to qualify for the runoff. In 2024, tactical withdrawal (désistement républicain) was deployed on a massive scale to block the Rassemblement National – but it relied on informal party coordination, not voter agency.",
        opportunity: "A swap platform could empower voters in the first round: 'I'll vote for your candidate in my constituency if you vote for mine in yours.' The French context demands a different model from the UK – more about ensuring the right candidates reach the second round. High political engagement and a strong tradition of tactical coordination make this fertile ground.",
        next: "Due by 2029; could be earlier given political instability.",
        centroid: [2.5, 46.5],
        labelOffset: [15, 15],
        paths: [
          [[-1.8,43.3],[-1.2,46],[-4.8,48.5],[-1.5,48.6],[1.5,51],[2.5,51],[3.5,50.3],[8,49],[7.5,47.5],[6.2,46.2],[7,44],[6,43.2],[3,43.3],[0,42.7],[-1.8,43.3]]
        ]
      },
      {
        id: "nigeria",
        name: "NIGERIA",
        year: "2027",
        tier: 2,
        system: "FPTP (House) + modified two-round (President)",
        seats: 360,
        problem: "The House of Representatives uses FPTP in 360 single-member constituencies. With three major parties and numerous smaller ones, vote-splitting is significant. Ethnic and regional voting patterns create structural inefficiencies.",
        opportunity: "Nigeria's large, young, digitally connected population could support a swap platform, particularly in the south where multi-party competition is most intense. The challenge is trust infrastructure and election integrity – a swap platform would need to operate within a context of broader democratic concerns.",
        next: "General elections scheduled January 2027.",
        centroid: [8, 10],
        labelOffset: [0, 15],
        paths: [
          [[3,6.5],[3,9],[4,12],[6,14],[9,13],[12,13.5],[14,13],[14,10],[13,7],[10,6],[7,4.5],[4,5],[2.7,6.3],[3,6.5]]
        ]
      },
      {
        id: "bangladesh",
        name: "BANGLADESH",
        year: "2031",
        tier: 3,
        system: "FPTP",
        seats: 300,
        problem: "300 FPTP seats with a historically two-party dominant system (BNP vs Awami League), though the Feb 2026 election (held after the ouster of Hasina) saw a more fragmented landscape. Vote-splitting in three-way contests is an emerging feature.",
        opportunity: "The 2026 election just happened, so the next is ~2031. However, the evolving multi-party dynamics post-Hasina make this worth watching. Mobile penetration is high. The challenge is political volatility and trust.",
        next: "~2031 (recently elected Feb 2026).",
        centroid: [90, 24],
        labelOffset: [15, 5],
        paths: [
          [[88.1,21.7],[88.5,22.5],[89,24],[89,25],[88.5,25.5],[89,26],[90,26.5],[92,25.5],[92,22],[91.5,21.5],[89.5,21.7],[88.1,21.7]]
        ]
      },
      {
        id: "ghana",
        name: "GHANA",
        year: "2028",
        tier: 3,
        system: "FPTP (Parliament)",
        seats: 276,
        problem: "Parliamentary seats are FPTP in single-member constituencies. The two dominant parties (NDC and NPP) alternate power, but in individual constituencies, third-party and independent candidates create spoiler dynamics.",
        opportunity: "Smaller scale, strong democratic tradition. Ghana's elections are well-administered and digitally engaged. Could serve as a pilot for the concept in West Africa.",
        next: "Parliamentary elections due 2028.",
        centroid: [-1.5, 8],
        labelOffset: [-30, -15],
        paths: [
          [[-3,5],[-3,7.5],[-2.5,11],[0,11.2],[1.2,11],[-0.1,5.5],[-1.5,5],[-3,5]]
        ]
      },
      {
        id: "kenya",
        name: "KENYA",
        year: "2027",
        tier: 3,
        system: "FPTP",
        seats: 290,
        problem: "290 FPTP constituency seats. Multi-ethnic coalition politics means candidates often win on thin pluralities. The system rewards regional ethnic blocks rather than national platforms.",
        opportunity: "Active civil society, strong tech sector (M-Pesa etc.), and a young digitally native population. The challenge is that voting patterns are heavily ethnic/regional, which may limit cross-constituency swap appeal.",
        next: "General elections due August 2027.",
        centroid: [38, 0],
        labelOffset: [15, -10],
        paths: [
          [[34,-1],[34,4.5],[36,5],[41,4],[41.5,2],[41,-2],[40,-4],[34,-1]]
        ]
      },
    ];

    const tierColors = {
      1: "#ff77ff",  // FD pink – core opportunity
      2: "#ffaaff",  // FD light pink – strong opportunity
      3: "#4ad4ad",  // FD teal – emerging opportunity
    };

    const tierLabels = {
      1: "Core opportunity",
      2: "Strong opportunity",
      3: "Emerging / future",
    };
    function SMVGlobalMap() {
      const [selected, setSelected] = useState(null);
      const [hoveredId, setHoveredId] = useState(null);
      const mapWidth = 900;
      const mapHeight = 560;

      const toX = (lon) => GP.toX(lon, mapWidth);
      const toY = (lat) => GP.toY(lat, mapHeight);

      const pathToSvg = (coords) => {
        return coords.map(([lon, lat], i) => {
          const x = toX(lon);
          const y = toY(lat);
          return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ") + " Z";
      };

      // Simple graticule lines
      const graticules = [];
      for (let lat = -60; lat <= 80; lat += 30) {
        const points = [];
        for (let lon = -180; lon <= 180; lon += 5) {
          points.push(`${toX(lon).toFixed(1)},${toY(lat).toFixed(1)}`);
        }
        graticules.push(points.join(" "));
      }
      const meridians = [];
      for (let lon = -180; lon <= 180; lon += 60) {
        const points = [];
        for (let lat = -90; lat <= 90; lat += 2) {
          points.push(`${toX(lon).toFixed(1)},${toY(lat).toFixed(1)}`);
        }
        meridians.push(points.join(" "));
      }

      const selectedCountry = countries.find(c => c.id === selected);

      return (
        <div style={{
          fontFamily: "'Space Mono', 'Courier New', monospace",
          background: "#0a0a14",
          color: "#e8e0d8",
          minHeight: "100vh",
          padding: "0",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; }
            .country-path {
              cursor: pointer;
              transition: opacity 0.2s, filter 0.2s;
            }
            .country-path:hover {
              filter: brightness(1.3);
            }
            .country-label {
              pointer-events: none;
              user-select: none;
            }
            .detail-card {
              animation: fadeIn 0.3s ease;
            }
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .tier-dot {
              display: inline-block;
              width: 12px;
              height: 12px;
              border-radius: 50%;
              margin-right: 8px;
              vertical-align: middle;
            }
          `}</style>

          {/* Header */}
          <div style={{
            padding: "32px 24px 20px",
            borderBottom: "1px solid #222",
          }}>
            <div style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "11px",
              letterSpacing: "3px",
              textTransform: "uppercase",
              color: "#ff77ff",
              marginBottom: "8px",
            }}>Swap My Vote</div>
            <h1 style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "28px",
              fontWeight: 700,
              lineHeight: 1.2,
              color: "#fff",
              marginBottom: "6px",
            }}>Global Opportunity Map</h1>
            <p style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "14px",
              color: "#888",
              maxWidth: "600px",
            }}>
              Countries where electoral systems create tactical voting problems that a vote-swapping platform could help solve – through 2029.
            </p>
          </div>

          {/* Legend */}
          <div style={{
            display: "flex",
            gap: "24px",
            padding: "16px 24px",
            flexWrap: "wrap",
          }}>
            {[1, 2, 3].map(tier => (
              <div key={tier} style={{
                display: "flex",
                alignItems: "center",
                fontFamily: "'DM Sans', sans-serif",
                fontSize: "12px",
                color: "#aaa",
              }}>
                <span className="tier-dot" style={{ background: tierColors[tier] }} />
                {tierLabels[tier]}
              </div>
            ))}
          </div>

          {/* Map */}
          <div style={{
            padding: "0 24px",
            overflowX: "auto",
          }}>
            <svg
              viewBox={`0 0 ${mapWidth} ${mapHeight}`}
              style={{
                width: "100%",
                maxWidth: "900px",
                height: "auto",
                display: "block",
                margin: "0 auto",
              }}
            >
              {/* Background */}
              <rect x="0" y="0" width={mapWidth} height={mapHeight} fill="#0f0f1a" rx="4" />

              {/* Graticule */}
              {graticules.map((pts, i) => (
                <polyline key={`grat-${i}`} points={pts} fill="none" stroke="#1a1a2e" strokeWidth="0.5" />
              ))}
              {meridians.map((pts, i) => (
                <polyline key={`mer-${i}`} points={pts} fill="none" stroke="#1a1a2e" strokeWidth="0.5" />
              ))}

              {/* Equator */}
              <line
                x1={0} y1={toY(0)} x2={mapWidth} y2={toY(0)}
                stroke="#252540" strokeWidth="0.8" strokeDasharray="4,4"
              />

              {/* Country shapes */}
              {countries.map(country => (
                <g key={country.id}>
                  {country.paths.map((path, pi) => (
                    <path
                      key={pi}
                      className="country-path"
                      d={pathToSvg(path)}
                      fill={tierColors[country.tier]}
                      fillOpacity={selected === country.id ? 0.9 : hoveredId === country.id ? 0.7 : 0.5}
                      stroke={selected === country.id ? "#fff" : tierColors[country.tier]}
                      strokeWidth={selected === country.id ? 1.5 : 0.8}
                      onClick={() => setSelected(selected === country.id ? null : country.id)}
                      onMouseEnter={() => setHoveredId(country.id)}
                      onMouseLeave={() => setHoveredId(null)}
                    />
                  ))}
                  {/* Label */}
                  <text
                    className="country-label"
                    x={toX(country.centroid[0]) + (country.labelOffset?.[0] || 0)}
                    y={toY(country.centroid[1]) + (country.labelOffset?.[1] || 0)}
                    fill="#fff"
                    fontSize="13"
                    fontWeight="700"
                    fontFamily="'DM Sans', sans-serif"
                    textAnchor="middle"
                    dominantBaseline="middle"
                  >
                    {country.name}
                  </text>
                  <text
                    className="country-label"
                    x={toX(country.centroid[0]) + (country.labelOffset?.[0] || 0)}
                    y={toY(country.centroid[1]) + (country.labelOffset?.[1] || 0) + 15}
                    fill={tierColors[country.tier]}
                    fontSize="11"
                    fontWeight="700"
                    fontFamily="'Space Mono', monospace"
                    textAnchor="middle"
                    dominantBaseline="middle"
                  >
                    {country.year}
                  </text>
                </g>
              ))}

              {/* Gall-Peters label */}
              <text x={mapWidth - 10} y={mapHeight - 8} fill="#333" fontSize="9" fontFamily="'Space Mono', monospace" textAnchor="end">
                Gall-Peters equal-area projection
              </text>
            </svg>
          </div>

          {/* Detail panel */}
          {selectedCountry && (
            <div className="detail-card" style={{
              margin: "20px 24px",
              padding: "24px",
              background: "#141420",
              border: `1px solid ${tierColors[selectedCountry.tier]}33`,
              borderRadius: "8px",
              borderLeft: `3px solid ${tierColors[selectedCountry.tier]}`,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "16px" }}>
                <div>
                  <h2 style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "22px",
                    fontWeight: 700,
                    color: "#fff",
                  }}>{selectedCountry.name}</h2>
                  <div style={{
                    fontFamily: "'Space Mono', monospace",
                    fontSize: "12px",
                    color: tierColors[selectedCountry.tier],
                    marginTop: "4px",
                  }}>
                    {selectedCountry.system} · {selectedCountry.seats} seats · Next: {selectedCountry.year}
                  </div>
                </div>
                <button
                  onClick={() => setSelected(null)}
                  style={{
                    background: "none",
                    border: "1px solid #333",
                    color: "#888",
                    padding: "4px 12px",
                    borderRadius: "4px",
                    cursor: "pointer",
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "12px",
                  }}
                >Close</button>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
                <div>
                  <h3 style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "12px",
                    fontWeight: 700,
                    color: "#888",
                    textTransform: "uppercase",
                    letterSpacing: "1.5px",
                    marginBottom: "6px",
                  }}>The Problem</h3>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "14px",
                    lineHeight: 1.6,
                    color: "#ccc",
                  }}>{selectedCountry.problem}</p>
                </div>
                <div>
                  <h3 style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "12px",
                    fontWeight: 700,
                    color: "#888",
                    textTransform: "uppercase",
                    letterSpacing: "1.5px",
                    marginBottom: "6px",
                  }}>SMV Opportunity</h3>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "14px",
                    lineHeight: 1.6,
                    color: "#ccc",
                  }}>{selectedCountry.opportunity}</p>
                </div>
                <div>
                  <h3 style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "12px",
                    fontWeight: 700,
                    color: "#888",
                    textTransform: "uppercase",
                    letterSpacing: "1.5px",
                    marginBottom: "6px",
                  }}>Timeline</h3>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif",
                    fontSize: "14px",
                    lineHeight: 1.6,
                    color: "#ccc",
                  }}>{selectedCountry.next}</p>
                </div>
              </div>
            </div>
          )}

          {!selectedCountry && (
            <div style={{
              padding: "16px 24px",
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "13px",
              color: "#555",
              textAlign: "center",
            }}>
              Tap a country to see the tactical voting problem and SMV opportunity
            </div>
          )}

          {/* Summary table */}
          <div style={{
            margin: "24px",
            padding: "24px",
            background: "#141420",
            borderRadius: "8px",
            border: "1px solid #1a1a2e",
          }}>
            <h2 style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "18px",
              fontWeight: 700,
              color: "#fff",
              marginBottom: "16px",
            }}>Election Timeline</h2>
            <div style={{ overflowX: "auto" }}>
              <table style={{
                width: "100%",
                borderCollapse: "collapse",
                fontFamily: "'DM Sans', sans-serif",
                fontSize: "13px",
              }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid #2a2a3e" }}>
                    {["Year", "Country", "System", "Seats", "Tier"].map(h => (
                      <th key={h} style={{
                        textAlign: "left",
                        padding: "8px 12px",
                        color: "#666",
                        fontSize: "11px",
                        textTransform: "uppercase",
                        letterSpacing: "1px",
                        fontWeight: 700,
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    { year: "2026", name: "USA (Midterms)", system: "FPTP", seats: "435 House", tier: 1 },
                    { year: "2027", name: "Nigeria", system: "FPTP", seats: "360", tier: 2 },
                    { year: "2027", name: "Kenya", system: "FPTP", seats: "290", tier: 3 },
                    { year: "2028", name: "USA (Presidential)", system: "FPTP + EC", seats: "435 + 538 EC", tier: 1 },
                    { year: "2028", name: "Ghana", system: "FPTP", seats: "276", tier: 3 },
                    { year: "≤2029", name: "France", system: "Two-round", seats: "577", tier: 2 },
                    { year: "2029", name: "India", system: "FPTP", seats: "543", tier: 1 },
                    { year: "≤2029", name: "Canada", system: "FPTP", seats: "343", tier: 1 },
                    { year: "2029", name: "UK", system: "FPTP", seats: "650", tier: 1 },
                    { year: "~2031", name: "Bangladesh", system: "FPTP", seats: "300", tier: 3 },
                  ].map((row, i) => (
                    <tr key={i} style={{ borderBottom: "1px solid #1a1a2e" }}>
                      <td style={{ padding: "10px 12px", color: tierColors[row.tier], fontFamily: "'Space Mono', monospace", fontWeight: 700 }}>{row.year}</td>
                      <td style={{ padding: "10px 12px", color: "#ddd", fontWeight: 500 }}>{row.name}</td>
                      <td style={{ padding: "10px 12px", color: "#999" }}>{row.system}</td>
                      <td style={{ padding: "10px 12px", color: "#999" }}>{row.seats}</td>
                      <td style={{ padding: "10px 12px" }}>
                        <span className="tier-dot" style={{ background: tierColors[row.tier] }} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Methodology note */}
          <div style={{
            margin: "0 24px 32px",
            padding: "20px",
            background: "#141420",
            borderRadius: "8px",
            border: "1px solid #1a1a2e",
            fontFamily: "'DM Sans', sans-serif",
          }}>
            <h2 style={{ fontSize: "18px", fontWeight: 700, color: "#fff", marginBottom: "12px" }}>
              What makes a country suitable for SMV?
            </h2>
            <div style={{ fontSize: "14px", lineHeight: 1.7, color: "#aaa" }}>
              <p style={{ marginBottom: "12px" }}>
                Four conditions create the tactical voting problem that vote swapping can address:
              </p>
              <p style={{ marginBottom: "8px", color: "#ccc" }}>
                <strong style={{ color: "#ff77ff" }}>1. Single-member constituencies</strong> – where one winner takes all and runner-up votes count for nothing. This is the core structural driver.
              </p>
              <p style={{ marginBottom: "8px", color: "#ccc" }}>
                <strong style={{ color: "#ff77ff" }}>2. Multi-party competition</strong> – three or more viable parties splitting the vote, creating spoiler effects and wasted votes. Two-party systems have less need for swapping.
              </p>
              <p style={{ marginBottom: "8px", color: "#ccc" }}>
                <strong style={{ color: "#ff77ff" }}>3. Safe seats and marginals</strong> – a geographic distribution of support that leaves most voters in constituencies where the outcome is predetermined. The swap unlocks value for voters on both sides.
              </p>
              <p style={{ marginBottom: "12px", color: "#ccc" }}>
                <strong style={{ color: "#ff77ff" }}>4. Digital infrastructure</strong> – sufficient internet/mobile penetration and a culture of online political engagement to support the platform.
              </p>
              <p style={{ color: "#888", fontSize: "13px" }}>
                Two-round systems (France) are included because the first round functions like a multi-candidate FPTP race – coordination on who qualifies for the runoff is the same class of problem. Systems with preferential/ranked voting (Australia, Ireland) are excluded because the ballot design already lets voters express both preference and strategy. PR systems are excluded entirely.
              </p>
            </div>
          </div>

          {/* Footer */}
          <div style={{
            padding: "20px 24px",
            borderTop: "1px solid #1a1a2e",
            fontFamily: "'DM Sans', sans-serif",
            fontSize: "11px",
            color: "#444",
            textAlign: "center",
          }}>
            Swap My Vote · Forward Democracy · Draft scoping document · April 2026
          </div>
        </div>
      );
    }
