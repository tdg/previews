const tierColors = { 1: "#ff77ff", 2: "#ffaaff", 3: "#4ad4ad" };
const tierLabels = { 1: "Core opportunity", 2: "Strong opportunity", 3: "Emerging / future" };

const SMVGlobalMap = function SMVGlobalMap() {
  const [selected, setSelected] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const mapW = 900, mapH = 500;
  const toX = (lon) => GP.toX(lon, mapW);
  const toY = (lat) => GP.toY(lat, mapH);
  const pathToSvg = (coords) => coords.map(([lon, lat], i) => `${i === 0 ? "M" : "L"}${toX(lon).toFixed(1)},${toY(lat).toFixed(1)}`).join(" ") + " Z";

  const graticules = [];
  for (let lat = -60; lat <= 80; lat += 30) {
    const pts = [];
    for (let lon = -180; lon <= 180; lon += 5) pts.push(`${toX(lon).toFixed(1)},${toY(lat).toFixed(1)}`);
    graticules.push(pts.join(" "));
  }

  const sc = countries.find(c => c.id === selected);

  const panel = sc ? (
    <div className="detail-card" style={{ padding: "18px", background: "#141420", border: `1px solid ${tierColors[sc.tier]}33`, borderRadius: "8px", borderLeft: `3px solid ${tierColors[sc.tier]}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
        <div>
          <h2 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "20px", fontWeight: 700, color: "#fff" }}>{sc.name}</h2>
          <div style={{ fontFamily: "'Space Mono',monospace", fontSize: "11px", color: tierColors[sc.tier], marginTop: "2px" }}>{sc.system} · {sc.seats} seats · {sc.year}</div>
        </div>
        <button onClick={() => setSelected(null)} style={{ background: "none", border: "1px solid #333", color: "#888", padding: "2px 8px", borderRadius: "4px", cursor: "pointer", fontSize: "11px" }}>✕</button>
      </div>
      {[["The Problem", sc.problem], ["SMV Opportunity", sc.opportunity], ["Timeline", sc.next]].map(([l, t]) => (
        <div key={l} style={{ marginBottom: "10px" }}>
          <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "10px", fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: "3px" }}>{l}</h3>
          <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "13px", lineHeight: 1.5, color: "#bbb", margin: 0 }}>{t}</p>
        </div>
      ))}
    </div>
  ) : (
    <div style={{ padding: "18px", fontFamily: "'DM Sans',sans-serif", fontSize: "13px", color: "#444" }}>
      <p style={{ marginBottom: "12px" }}>Tap a country to see the tactical voting problem and SMV opportunity.</p>
      <div style={{ fontSize: "11px", color: "#333", lineHeight: 1.6 }}>
        {countries.map(c => (
          <div key={c.id} style={{ cursor: "pointer", padding: "4px 0", borderBottom: "1px solid #1a1a2e" }} onClick={() => setSelected(c.id)}>
            <span style={{ color: tierColors[c.tier], fontFamily: "'Space Mono',monospace", fontWeight: 700, marginRight: "8px" }}>{c.year}</span>
            <span style={{ color: "#999" }}>{c.name}</span>
          </div>
        ))}
      </div>
    </div>
  );

    <div style={{ fontFamily: "'Space Mono',monospace", background: "#0a0a14", color: "#e8e0d8", minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        .country-path{cursor:pointer;transition:opacity .2s,filter .2s}
        .country-path:hover{filter:brightness(1.3)}
        .country-label{pointer-events:none;user-select:none}
        .detail-card{animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "13px", color: "#777", maxWidth: "550px" }}>Countries where electoral systems create tactical voting problems that vote-swapping could help solve – through 2029.</p>
      </div>

            <span className="tier-dot" style={{ background: tierColors[t] }} />{tierLabels[t]}
          </div>
        ))}
      </div>

      {/* Map + side panel */}

        <div style={{ flex: "1 1 520px", minWidth: "300px" }}>

            <rect x="0" y="0" width={mapW} height={mapH} fill="#0f0f1a" rx="4" />
            {graticules.map((pts, i) => <polyline key={i} points={pts} fill="none" stroke="#151525" strokeWidth="0.5" />)}
            {continents.map(c => c.paths.map((p, i) => <path key={`${c.name}-${i}`} d={pathToSvg(p)} fill="#1a1a30" stroke="#2a2a48" strokeWidth="0.6" />))}
            {countries.map(c => (
              <g key={c.id}>

                    onMouseEnter={() => setHoveredId(c.id)} onMouseLeave={() => setHoveredId(null)} />
                ))}
                <text className="country-label" x={toX(c.centroid[0])+(c.labelOffset?.[0]||0)} y={toY(c.centroid[1])+(c.labelOffset?.[1]||0)}
                  fill="#fff" fontSize="12" fontWeight="700" fontFamily="'DM Sans',sans-serif" textAnchor="middle" dominantBaseline="middle">{c.name}</text>
                <text className="country-label" x={toX(c.centroid[0])+(c.labelOffset?.[0]||0)} y={toY(c.centroid[1])+(c.labelOffset?.[1]||0)+13}
                  fill={tierColors[c.tier]} fontSize="10" fontWeight="700" fontFamily="'Space Mono',monospace" textAnchor="middle" dominantBaseline="middle">{c.year}</text>

                { year:"2027", name:"Nigeria", system:"FPTP", seats:"360", pop:"230m", voters:"~93m", tier:2,
                  sit:"Tinubu's APC faces united opposition. Three-way races across 360 FPTP constituencies with deep ethnic-regional fault lines.",
                  smv:"Coordinate opposition votes in swing constituencies. Risk: entrench ethnic bloc voting or co-option by party machines." },
                { year:"2027", name:"Kenya", system:"FPTP", seats:"290", pop:"56m", voters:"~22m", tier:3,
                  sit:"Post-Ruto realignment after 2024–25 protests. Ethnicity remains the dominant predictor of constituency outcomes.",

                { year:"2028", name:"USA (Presidential)", system:"FPTP+EC", seats:"538 EC", pop:"340m", voters:"~180m", tier:1,
                  sit:"Post-Trump succession. Winner-take-all EC means safe-state votes are structurally irrelevant.",
                  smv:"Proven use case, operated 2000–2024. The n-for-1 ratio (pioneered 2024 with FD support) is the key innovation. Vote swapping has been upheld as free speech – the risk is whether that precedent survives a captive Supreme Court." },
                { year:"2028", name:"Ghana", system:"FPTP", seats:"276", pop:"34m", voters:"~18m", tier:3,
                  sit:"NDC under Mahama seeking re-election. Two-party dominance but independents increasingly competitive.",
                  smv:"Could help smaller parties coordinate. Risk: low – strong democratic institutions." },
                { year:"≤2027", name:"Poland (Senate)", system:"FPTP", seats:"100", pop:"38m", voters:"~30m", tier:2,
                  sit:"Tusk's coalition governs but PiS's Nawrocki holds the presidency with veto power. Multi-party fragmentation on both left and right. Senate control is critical to legislative progress.",
                  smv:"Textbook Senate swap territory – opposition coordination on single candidates flipped the Senate in 2023. SMV formalises what Polish civic groups already do manually. Risk: low – strong democratic culture, high engagement." },
                { year:"≤2029", name:"France", system:"Two-round", seats:"577", pop:"68m", voters:"~49m", tier:2,
                  sit:"Four-bloc fragmentation. 2024 saw massive tactical withdrawal to block RN in runoffs.",
                  smv:"First-round coordination – formalising désistement républicain at voter level. Risk: framed as manipulation of two-round design." },
                { year:"2029", name:"India", system:"FPTP", seats:"543", pop:"1.44bn", voters:"~970m", tier:1,
                  sit:"Modi's NDA governs as coalition after losing majority in 2024. INDIA bloc can coordinate but faces state-level fragmentation.",
                  smv:"Immense potential – 543 seats, endemic splitting. Risk: co-opted to consolidate majoritarian blocs, or face government hostility." },
                { year:"≤2029", name:"Canada", system:"FPTP", seats:"343", pop:"41m", voters:"~28m", tier:1,
                  sit:"Carney's Liberals have a majority. NDP collapsed to 7 seats. Strong electoral reform movement.",
                  smv:"Natural home – progressive splitting routinely hands seats to Conservatives. Risk: low – mature democratic culture." },
                { year:"2029", name:"UK", system:"FPTP", seats:"650", pop:"68m", voters:"~48m", tier:1,
                  sit:"Labour's 2024 landslide on 34% – most disproportionate result in modern history. Reform polling strongly.",
                  smv:"SMV's home turf. Risk: Reform could use the same infrastructure for right-wing tactical coordination." },
                { year:"~2030", name:"Hungary", system:"Mixed (106 FPTP)", seats:"199", pop:"10m", voters:"~8m", tier:3,
                  sit:"Tisza's Magyar ended 16 years of Orbán in April 2026 with a supermajority. Democratic renewal underway. Electoral reform possible but FPTP constituency component may survive.",
                  smv:"If the mixed system persists, the 106 FPTP seats will again require opposition coordination. The 2026 election proved that single-candidate strategy works – SMV could automate it. Risk: system may be reformed before next election." },
                { year:"~2031", name:"Bangladesh", system:"FPTP", seats:"300", pop:"175m", voters:"~127m", tier:3,
                  sit:"Post-revolution. BNP government elected Feb 2026. Awami League banned. Multi-party landscape emerging.",
                  smv:"Watch brief. Risk: political volatility, potential co-option by party machines." },
              ].map((r, i) => (
                <React.Fragment key={i}>
                  <tr style={{ borderBottom: "none" }}>
                    <td style={{ padding: "8px 10px 1px", color: tierColors[r.tier], fontFamily: "'Space Mono',monospace", fontWeight: 700, verticalAlign: "top", fontSize: "11px" }}>{r.year}</td>
                    <td style={{ padding: "8px 10px 1px", color: "#ddd", fontWeight: 500, verticalAlign: "top" }}>{r.name}</td>
                    <td style={{ padding: "8px 10px 1px", color: "#888", verticalAlign: "top" }}>{r.system}</td>
                    <td style={{ padding: "8px 10px 1px", color: "#888", verticalAlign: "top", whiteSpace: "nowrap" }}>{r.seats}</td>
                    <td style={{ padding: "8px 10px 1px", color: "#888", verticalAlign: "top", whiteSpace: "nowrap" }}>{r.pop}</td>
                    <td style={{ padding: "8px 10px 1px", color: "#888", verticalAlign: "top", whiteSpace: "nowrap" }}>{r.voters}</td>
                    <td style={{ padding: "8px 10px 1px", verticalAlign: "top" }}><span className="tier-dot" style={{ background: tierColors[r.tier] }} /></td>
                  </tr>
                  <tr style={{ borderBottom: "1px solid #1a1a2e" }}>
                    <td colSpan={7} style={{ padding: "1px 10px 10px" }}>
                      <div style={{ fontSize: "11px", lineHeight: 1.45, color: "#888", maxWidth: "780px" }}>{r.sit}</div>
                      <div style={{ fontSize: "11px", lineHeight: 1.45, color: "#666", maxWidth: "780px", marginTop: "2px" }}>
                        <span style={{ color: tierColors[r.tier], fontWeight: 500, opacity: 0.7 }}>SMV:</span> {r.smv}
                      </div>
                    </td>
                  </tr>
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Methodology */}
      <div style={{ margin: "0 24px 20px", padding: "18px", background: "#141420", borderRadius: "8px", border: "1px solid #1a1a2e", fontFamily: "'DM Sans',sans-serif" }}>
        <h2 style={{ fontSize: "17px", fontWeight: 700, color: "#fff", marginBottom: "8px" }}>What makes a country suitable for SMV?</h2>
        <div style={{ fontSize: "13px", lineHeight: 1.6, color: "#aaa" }}>
          <p style={{ marginBottom: "8px" }}>Four conditions create the tactical voting problem that vote swapping addresses:</p>
          {[
            ["1. Single-member constituencies", "one winner takes all, runner-up votes wasted."],
            ["2. Multi-party competition", "three or more parties splitting the vote, creating spoiler effects."],
            ["3. Safe seats and marginals", "predetermined outcomes in most constituencies. The n-for-1 ratio model (proven US 2024) compensates for asymmetric swing-seat value."],
            ["4. Digital infrastructure", "internet/mobile penetration and online political engagement."],
          ].map(([t, d]) => <p key={t} style={{ marginBottom: "4px", color: "#ccc" }}><strong style={{ color: "#ff77ff" }}>{t}</strong> – {d}</p>)}
          <p style={{ color: "#666", fontSize: "11px", marginTop: "8px" }}>Two-round systems (France) included – first round is effectively multi-candidate FPTP. Preferential voting (Australia, Ireland) excluded – ballot design solves the problem. PR excluded entirely.</p>
        </div>
      </div>

      <div style={{ padding: "14px 24px", borderTop: "1px solid #1a1a2e", fontFamily: "'DM Sans',sans-serif", fontSize: "10px", color: "#333", textAlign: "center" }}>
        Swap My Vote · Forward Democracy · Draft scoping document · April 2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SMVGlobalMap));
</script>
